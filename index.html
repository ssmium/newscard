<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>카드뉴스 메이커 안정판</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<style>
*{box-sizing:border-box}
body{margin:0;background:#f5f5f5;color:#111;font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:14px}
.app{display:flex;min-height:100vh}
.sidebar{width:210px;min-width:210px;background:#fff;border-right:1px solid #eee;position:fixed;inset:0 auto 0 0;padding:24px 18px;display:flex;flex-direction:column;gap:20px}
.logo{display:flex;gap:10px;align-items:center;padding-bottom:18px;border-bottom:1px solid #eee}
.logo-mark{width:30px;height:30px;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;border-radius:6px;font-family:Georgia,serif;font-weight:900}
.logo-text{font-size:12px;font-weight:900;letter-spacing:.18em}
.side-label{font-size:11px;color:#888;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin:4px 0 8px}
.nav{padding:10px 12px;border-radius:8px;font-size:13px;font-weight:800;background:#f5f5f5}
.step{border-top:1px solid #eee;padding-top:16px}
.step-item{display:flex;gap:10px;margin-bottom:12px;font-size:11px;color:#777;line-height:1.45}
.step-num{width:20px;height:20px;background:#f472b6;color:white;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex:0 0 auto}
.main{margin-left:210px;width:calc(100% - 210px);padding:32px}
.wrap{max-width:1380px;margin:0 auto}
.section-label{font-size:12px;color:#aaa;font-weight:800;margin-bottom:6px}
h1{font-size:24px;margin:0 0 18px}
.panel{background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:22px;margin-bottom:20px}
.top-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.select{padding:9px 12px;border:1.5px solid #ddd;border-radius:9px;min-width:260px;font-family:inherit;font-weight:700}
.badge{font-size:12px;color:#777;background:#f7f7f7;border-radius:999px;padding:6px 10px}
.search-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.search-box{border:1.5px solid #e8e8e8;border-radius:14px;padding:16px}
.search-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.search-title{font-weight:900}
.count{font-size:11px;color:#888}
.chips{display:flex;flex-wrap:wrap;gap:6px;min-height:30px;margin-bottom:8px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;border:1.5px solid #f472b6;background:#fff0f6;color:#be185d;font-size:12px;font-weight:800}
.chip-x{cursor:pointer;opacity:.65}
.suggest{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px}
.suggest button{border:0;background:#f5f5f7;border-radius:999px;padding:5px 10px;font-size:11px;cursor:pointer;color:#666;font-family:inherit}
.add-row{display:flex;gap:8px;margin-bottom:10px}
.add-row input{flex:1;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-family:inherit;outline:none}
.add-row button,.search-btn{border:0;background:#111;color:#fff;border-radius:10px;font-weight:900;cursor:pointer;font-family:inherit}
.add-row button{padding:0 16px}
.search-btn{width:100%;padding:13px}
.results{display:none;max-height:380px;overflow-y:auto;padding-right:4px}
.result-meta{font-size:12px;color:#888;margin-bottom:12px}
.article{display:flex;gap:12px;align-items:center;padding:12px;border:1.5px solid #eee;border-radius:12px;cursor:pointer;margin-bottom:9px;background:#fff;transition:.12s}
.article:hover,.article.selected{border-color:#111;background:#fafafa}
.thumb{width:58px;height:52px;border-radius:10px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto}
.article-info{flex:1;min-width:0}
.article-title{font-size:13px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.article-desc{font-size:11px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.article-sub{font-size:11px;color:#999;margin-bottom:3px}
.article button{border:0;background:#111;color:#fff;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:900;cursor:pointer}
.cards-panel{display:none}
.download-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.hint{font-size:12px;color:#aaa}
.zip{border:0;background:#111;color:#fff;border-radius:12px;padding:12px 18px;font-family:inherit;font-weight:900;cursor:pointer}
.card-scroll{overflow-x:auto;padding:14px 6px 12px}
.card-row{display:flex;gap:18px;min-width:max-content}
.card-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.card-label{font-size:11px;color:#aaa;font-weight:900;letter-spacing:.14em}
.card-wrap{width:224px;height:224px;border-radius:16px;position:relative;background:transparent}
.card-wrap::before{content:"";position:absolute;inset:14px -10px -10px 14px;background:rgba(0,0,0,.08);border-radius:16px;z-index:0}
.card-inner{position:relative;z-index:1;width:100%;height:100%;border-radius:16px;overflow:hidden;box-shadow:0 16px 32px rgba(0,0,0,.16),0 5px 10px rgba(0,0,0,.06)}
.img-btn{padding:7px 16px;border:1.5px solid #ddd;background:#fff;border-radius:8px;cursor:pointer;font-family:inherit}
.edit-row{display:flex;gap:18px;overflow-x:auto;padding-top:16px}
.edit-panel{width:224px;min-width:224px;border:1px solid #eee;border-radius:14px;padding:12px;background:#fff}
.edit-label{font-size:10px;font-weight:900;color:#999;margin:8px 0 4px}
.edit-panel textarea{width:100%;border:1.5px solid #ddd;border-radius:9px;padding:8px;font-family:inherit;font-size:12px;resize:vertical;outline:none}
.title-input{min-height:60px}
.body-input{min-height:106px}
.color-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.color-item{display:flex;align-items:center;justify-content:space-between;border:1px solid #eee;border-radius:9px;padding:6px 8px;font-size:11px;font-weight:800;color:#666}
.color-item input{width:34px;height:24px;border:0;background:transparent;padding:0}
.size-row{display:flex;align-items:center;gap:8px;margin-top:9px;font-size:11px;color:#666}
.size-row input{flex:1;accent-color:#111}
.apply{width:100%;border:0;background:#111;color:#fff;border-radius:9px;padding:9px;font-family:inherit;font-weight:900;margin-top:10px;cursor:pointer}
.caption{background:#fafafa;border-radius:14px;padding:16px;margin-top:16px}
.caption-title{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:900;margin-bottom:10px}
.caption-line{font-size:13px;line-height:1.7;margin-bottom:5px}
.copy{border:1.5px solid #ddd;background:#fff;border-radius:8px;padding:6px 12px;font-family:inherit;cursor:pointer}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111;color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;z-index:9999;opacity:0;transition:.2s;pointer-events:none}
.toast.show{opacity:1}
.loading{position:fixed;inset:0;background:rgba(255,255,255,.86);display:none;align-items:center;justify-content:center;z-index:9990;flex-direction:column;gap:12px}
.loading.show{display:flex}
.spinner{width:34px;height:34px;border:3px solid #ddd;border-top-color:#111;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0;width:100%;padding:18px}.search-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><div class="logo-mark">M</div><div class="logo-text">MAGAZINIE</div></div>
    <div>
      <div class="side-label">Make</div>
      <div class="nav">② 카드뉴스 만들기</div>
    </div>
    <div class="step">
      <div class="side-label">카드뉴스 만드는 순서</div>
      <div class="step-item"><span class="step-num">1</span><span><b>기사 검색</b><br>키워드를 넣고 뉴스를 불러와요.</span></div>
      <div class="step-item"><span class="step-num">2</span><span><b>기사 클릭</b><br>선택한 기사로 5컷이 전부 새로 바뀌어요.</span></div>
      <div class="step-item"><span class="step-num">3</span><span><b>편집</b><br>색상·제목·본문·이미지를 수정해요.</span></div>
      <div class="step-item"><span class="step-num">4</span><span><b>저장</b><br>PNG/ZIP으로 다운로드해요.</span></div>
    </div>
  </aside>

  <main class="main">
    <div class="wrap">
      <div class="section-label">Step 3</div>
      <h1>뷰티·패션 카드뉴스</h1>

      <div class="panel">
        <div class="top-row">
          <select id="magazine" class="select">
            <option value="what.is.mag">와디즈 매거진</option>
            <option value="magazinie">MAGAZINIE</option>
          </select>

        <div class="search-grid">
          <div class="search-box">

            <div id="beauty-chips" class="chips"></div>
            <div id="beauty-suggest" class="suggest"></div>

            <button class="search-btn" onclick="searchNews('beauty')">뷰티 검색</button>

      <div id="cards-panel" class="panel cards-panel">

</div>

<div id="loading" class="loading"><div class="spinner"></div><div id="loading-text">로딩 중...</div></div>
<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const NAVER_ID='U5if8lC21g_3L95AgqVS';
const NAVER_SEC='9qtZj8bb1H';

const SUGGEST={
  beauty:['뷰티','화장품','장원영','포토콜','메디큐브','올리브영','라네즈','이니스프리','클리오','롬앤'],
  fashion:['패션','스타일','공항패션','무신사','데님','마뗑킴','트렌드','룩북','브랜드','팝업']
};

let tags={beauty:[],fashion:[]};
let currentArticles=[];
let cards=[];
let generationSeq=0;
let cardImages={};
let cardStyles={};
let lastQuery='';

function $(id){return document.getElementById(id)}
function cleanHtml(v){
  const d=document.createElement('div'); d.innerHTML=String(v||'');
  return (d.textContent||'').replace(/\s+/g,' ').trim();
}
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function showLoading(msg){$('loading-text').textContent=msg||'로딩 중...';$('loading').classList.add('show')}
function hideLoading(){$('loading').classList.remove('show')}

function init(){
  renderKeywords('beauty'); renderKeywords('fashion');
  ['beauty','fashion'].forEach(type=>{
    $(type+'-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addKeyword(type)}})
  });
}
window.addEventListener('DOMContentLoaded',init);

function renderKeywords(type){
  const box=$(type+'-chips'), sug=$(type+'-suggest');
  box.innerHTML=tags[type].map((t,i)=>`<span class="chip">${t}<span class="chip-x" onclick="removeKeyword('${type}',${i})">×</span></span>`).join('');
  sug.innerHTML=SUGGEST[type].filter(v=>!tags[type].includes(v)).map(v=>`<button onclick="addKeyword('${type}','${v}')">+ ${v}</button>`).join('');
  $(type+'-count').textContent='키워드 '+tags[type].length+'개';
}
function addKeyword(type,value){
  const input=$(type+'-input');
  const v=(value||input.value||'').trim();
  if(!v){showToast('키워드를 입력해 주세요.');return}
  // 직접 입력/추천 클릭한 키워드는 검색 주제를 명확히 하기 위해 단독 칩으로 반영
  tags[type]=[v];
  input.value='';
  renderKeywords(type);
}
function removeKeyword(type,i){tags[type].splice(i,1);renderKeywords(type)}

async function fetchJson(url,opt={},timeout=10000){
  const ctrl=new AbortController(); const timer=setTimeout(()=>ctrl.abort(),timeout);
  try{
    const res=await fetch(url,{...opt,signal:ctrl.signal});
    const text=await res.text();
    const data=JSON.parse(text);
    if(data.errorCode||data.errorMessage) throw new Error(data.errorMessage||'API 오류');
    return data;
  } finally {clearTimeout(timer)}
}

async function searchNews(type){
  const input=$(type+'-input').value.trim();
  if(input) addKeyword(type,input);
  const q=tags[type].length?tags[type].join(' '):(type==='beauty'?'뷰티 화장품':'패션 스타일');
  lastQuery=q;
  showLoading('"'+q+'" 뉴스 검색 중...');
  try{
    let items=[];
    try{items=await searchNaverApi(q)}
    catch(e){console.warn('api fail',e);items=await searchNaverHtml(q)}
    currentArticles=items.map((it,i)=>normalizeArticle(it,i,type));
    renderArticles();
    $('results-panel').style.display='block';
    $('result-count').textContent=currentArticles.length;
    showToast('뉴스 '+currentArticles.length+'건을 불러왔어요.');
  }catch(e){
    console.error(e); showToast('검색 실패. 키워드를 바꿔보세요.');
  }
  hideLoading();
}

async function searchNaverApi(q){
  const target=`https://openapi.naver.com/v1/search/news.json?query=${encodeURIComponent(q)}&display=20&sort=date`;
  const headers={'X-Naver-Client-Id':NAVER_ID,'X-Naver-Client-Secret':NAVER_SEC};
  const attempts=[
    {url:`https://corsproxy.io/?${encodeURIComponent(target)}`,opt:{headers}},
    {url:`https://thingproxy.freeboard.io/fetch/${target}`,opt:{headers}},
    {url:target,opt:{headers}}
  ];
  for(const a of attempts){
    try{const data=await fetchJson(a.url,a.opt); if(data.items) return data.items}
    catch(e){console.warn('proxy fail',e.message)}
  }
  throw new Error('api fail');
}
async function searchNaverHtml(q){
  const target=`https://search.naver.com/search.naver?where=news&query=${encodeURIComponent(q)}&sort=1`;
  const proxies=[`https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`,`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(target)}`];
  for(const p of proxies){
    try{
      const res=await fetch(p); if(!res.ok) continue;
      const html=await res.text(); const arr=parseNaverHtml(html);
      if(arr.length) return arr;
    }catch(e){}
  }
  throw new Error('html fail');
}
function parseNaverHtml(html){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const seen=new Set(), arr=[];

  const candidates=[
    ...doc.querySelectorAll('a.news_tit'),
    ...doc.querySelectorAll('a[href*="news.naver.com"]'),
    ...doc.querySelectorAll('a[href*="n.news.naver.com"]')
  ];

  candidates.forEach(a=>{
    const href=a.href||a.getAttribute('href')||'';
    const title=cleanHtml(a.getAttribute('title')||a.textContent||'');
    if(title.length<8 || seen.has(href)) return;
    seen.add(href);

    const box=a.closest('li')||a.closest('.bx')||a.closest('.news_area')||a.parentElement;
    let desc='';
    if(box){
      const descEl=box.querySelector('.dsc_txt_wrap')||box.querySelector('.news_dsc')||box.querySelector('.api_txt_lines')||box.querySelector('p');
      desc=descEl?cleanHtml(descEl.textContent):'';
    }
    arr.push({title,description:desc,link:href,originallink:href,pubDate:'',source:'naver'});
  });

  return arr.slice(0,20);
}

function candidateArticleUrls(article){
  const urls=[article.url,article.origin].filter(Boolean);
  const extra=[];

  urls.forEach(url=>{
    try{
      const u=new URL(url);
      const oid=u.searchParams.get('oid');
      const aid=u.searchParams.get('aid');
      if(oid && aid){
        extra.push(`https://n.news.naver.com/mnews/article/${oid}/${aid}`);
        extra.push(`https://n.news.naver.com/article/${oid}/${aid}`);
      }

      const m=url.match(/\/article\/(\d+)\/(\d+)/);
      if(m){
        extra.push(`https://n.news.naver.com/mnews/article/${m[1]}/${m[2]}`);
      }
    }catch(e){}
  });

  return [...new Set([...extra,...urls])];
}

async function fetchTextProxy(targetUrl){
  const proxies=[
    `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
  ];

  for(const url of proxies){
    let timer=null;
    try{
      const ctrl=new AbortController();
      timer=setTimeout(()=>ctrl.abort(),6500);
      const res=await fetch(url,{signal:ctrl.signal});
      if(!res.ok) continue;
      const text=await res.text();
      if(text && text.length>400) return text;
    }catch(e){
      console.warn('본문 프록시 실패:', e.message);
    }finally{
      if(timer) clearTimeout(timer);
    }
  }

  return '';
}

function extractArticleBody(htmlText){
  const doc=new DOMParser().parseFromString(htmlText,'text/html');
  doc.querySelectorAll('script,style,iframe,button,nav,aside,form,header,footer,.u_likeit,.media_end_categorize,.byline,.copyright,.promotion,.related_news').forEach(el=>el.remove());

  const selectors=[
    '#dic_area',
    '#newsct_article',
    '#articeBody',
    '#articleBodyContents',
    '.go_trans._article_content',
    '.newsct_article',
    '.media_end_body',
    '.article_body',
    '.article-body',
    '.article_view',
    'article'
  ];

  let best='';
  selectors.forEach(sel=>{
    const el=doc.querySelector(sel);
    if(el){
      const text=cleanHtml(el.textContent||'');
      if(text.length>best.length) best=text;
    }
  });

  if(best.length<150){
    const meta=
      doc.querySelector('meta[property="og:description"]')?.getAttribute('content') ||
      doc.querySelector('meta[name="description"]')?.getAttribute('content') ||
      '';
    if(meta && meta.length>best.length) best=cleanHtml(meta);
  }

  if(best.length<150){
    const paragraphs=[...doc.querySelectorAll('p')]
      .map(p=>cleanHtml(p.textContent||''))
      .filter(t=>t.length>25)
      .filter(t=>!/(무단전재|재배포|Copyright|저작권|기자|구독|공유)/i.test(t))
      .slice(0,12);
    best=paragraphs.join(' ');
  }

  return cleanHtml(best)
    .replace(/본문\s*요약봇.*$/,'')
    .replace(/무단전재\s*및\s*재배포\s*금지.*$/,'')
    .trim();
}

async function readArticleBody(article){
  const urls=candidateArticleUrls(article);
  for(const url of urls){
    const html=await fetchTextProxy(url);
    if(!html) continue;

    const body=extractArticleBody(html);
    if(body && body.length>120){
      console.log('[ARTICLE_BODY_OK]', body.length, url);
      return body;
    }
  }

  console.warn('[ARTICLE_BODY_FAIL] 본문 접근 실패. 검색 결과 설명으로 대체합니다.');
  return '';
}


function normalizeArticle(it,i,type){
  const url=it.originallink||it.link||'';
  let domain=''; try{domain=new URL(url).hostname.replace(/^www\./,'')}catch(e){}
  const date=it.pubDate?new Date(it.pubDate).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
  return {id:i,title:cleanHtml(it.title),desc:cleanHtml(it.description),url:it.link||url,origin:it.originallink||'',domain,date,type};
}

function extractRegion(text){
  const m=String(text).match(/(서울|인천|부산|대구|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주)(?:\s*[가-힣]+구)?/);
  return m?m[0].replace(/\s+/g,' '):'';
}
function extractCount(text){
  const m=String(text).match(/([0-9]+)\s*(곳|개|명|종|건|회|개소)/);
  return m?m[0]:'';
}
function extractName(text){
  const s=String(text);
  const m=s.match(/(?:아이브|IVE)의?\s*([가-힣]{2,4})/)||s.match(/([가-힣]{2,4})(?:이|가|은|는).{0,30}(?:포토콜|행사|등장|참석|공개)/);
  return m?m[1]:'';
}
function extractEvent(text){
  const q=[...String(text).matchAll(/[‘'“"]([^’'”"]{3,45})[’'”"]/g)].map(x=>x[1]);
  return q.find(v=>/(라운지|팝업|포토콜|행사|스토어|글로우|테크|오픈)/.test(v))||'브랜드 포토콜';
}
function inferTopic(title,desc){
  const s=title+' '+desc;
  if(/(장원영|아이브|IVE|포토콜|행사에 참석|행사에 등장)/i.test(s)&&/(포토콜|행사|등장|참석|팝업)/.test(s)) return 'celeb';
  if(s.includes('물놀이장')) return 'water';
  if(/(소나기|호우|폭우|비|날씨|특보|장마|태풍)/.test(s)) return 'weather';
  if(/(책방|서점|탐사기)/.test(s)) return 'bookstore';
  if(s.includes('팝업')) return 'popup';
  if(s.includes('카페')) return 'cafe';
  if(/(화장품|뷰티|토너|스킨케어|메디큐브)/.test(s)) return 'beauty';
  if(/(패션|스타일|룩)/.test(s)) return 'fashion';
  return 'general';
}
function end(s){
  s=String(s||'').trim();
  if(!s) return '';
  s=s.replace(/요요/g,'요').replace(/죠요/g,'죠');
  if(/[.!?]$/.test(s)) return s;
  if(/(요|죠|다|니다|예요|이에요|거예요|하거든요)$/.test(s)) return s+'.';
  return s+'예요.';
}
function two(a,b,max=165){const s=(end(a)+' '+end(b)).replace(/\s+/g,' ').trim(); return s.length>max?s.slice(0,max-1).replace(/\s+\S*$/,'')+'…':s}

function removePressNoise(title){
  return cleanHtml(title)
    .replace(/\[[^\]]+\]/g,'')
    .replace(/[“”"]/g,'')
    .replace(/\s*[-|].*$/,'')
    .replace(/….*$/,'')
    .replace(/\s+등$/,'')
    .replace(/^\W+/,'')
    .trim();
}
function titleSubject(title,desc){
  const s=removePressNoise(title);
  const quoted=(s.match(/'([^']+)'/)||s.match(/‘([^’]+)’/))?.[1];
  if(quoted && quoted.length<=14) return quoted;
  const name=extractName(title+' '+desc);
  if(name) return name;
  const region=extractRegion(title+' '+desc);
  const count=extractCount(title+' '+desc);
  if(region && count) return region+' '+count;
  const words=s.split(/\s+/).filter(Boolean);
  let subject=words.slice(0,3).join(' ');
  subject=subject.replace(/(개최|진행|발령|확대|공개|출시|오픈|등장|참석)$/,'').trim();
  return subject.slice(0,16)||'이슈';
}

function makeHook(title,desc){
  const topic=inferTopic(title,desc), s=title+' '+desc;
  if(topic==='celeb'){const n=extractName(s)||'셀럽'; return `${n} 포토콜\n비주얼 난리났네!`}
  if(topic==='water'){const r=extractRegion(s), c=extractCount(s); return `${r||'여름'} 물놀이장 ${c||''}\n순차적으로 열려요!`.replace('  ',' ')}
  if(topic==='weather'){const r=extractRegion(s)||'전국'; return `${r} 날씨 비상\n우산 꼭 챙겨요!`}
  if(topic==='bookstore') return `동네 책방 이야기\n어떤 곳일까?`
  if(topic==='popup') return `요즘 팝업\n왜 주목받을까?`
  if(topic==='cafe') return `${extractRegion(s)||'요즘'} 카페\n왜 화제일까?`
  if(topic==='beauty') return `${titleSubject(title,desc)}\n왜 주목받을까?`
  if(topic==='fashion') return `${titleSubject(title,desc)}\n스타일 화제!`

  const subject=titleSubject(title,desc);
  if(subject.length<=10) return `${subject}\n왜 주목받을까?`;

  const words=subject.split(/\s+/); 
  let l1='',l2='';
  words.forEach(w=>{
    if((l1+' '+w).trim().length<=12) l1=(l1+' '+w).trim();
    else if((l2+' '+w).trim().length<=14) l2=(l2+' '+w).trim();
  });
  return `${l1||subject.slice(0,12)}\n${l2||'한눈에 정리!'}`;
}
function makePoints(title,desc){
  const topic=inferTopic(title,desc), s=title+' '+desc;
  if(topic==='celeb'){
    const n=extractName(s)||'장원영', ev=extractEvent(s), loc=extractRegion(s)||'서울';
    return [
      two(`아이브의 ${n}이 ${loc}에서 열린 ‘${ev}’ 포토콜에 등장했어요`, `그녀의 멋진 비주얼이 팬들과 대중의 관심을 집중시켰죠. 많은 사람들이 그녀의 모습에 반하고 말았어요!`),
      two(`${n}이 주목받는 이유는 단순히 예쁜 비주얼 때문만은 아니에요`, `현장 분위기를 압도하는 자신감과 브랜드 이미지까지 자연스럽게 끌어올리는 힘이 있기 때문이에요`),
      two(`${n}의 매력은 단순히 외적인 것이 아니라 그녀가 가진 분위기와 자신감이 더해진 결과예요`, `앞으로의 활동도 기대되며 많은 사람들이 계속 그녀를 주목할 것으로 보여요. 영향력은 이미 대단하거든요!`)
    ];
  }
  if(topic==='weather'){
    const r=extractRegion(s)||'전국';
    return [
      two(`${r}에 강한 소나기와 비 소식이 전해졌어요`, `갑작스러운 날씨 변화로 외출 전 우산과 이동 동선을 확인하는 것이 좋아요`),
      two(`이번 소식이 중요한 이유는 짧은 시간에도 강한 비가 쏟아질 수 있기 때문이에요`, `출퇴근길과 야외 일정에 바로 영향을 줄 수 있어 시민들의 주의가 필요해요`),
      two(`당분간 지역별 날씨 변동이 이어질 가능성이 있어요`, `실시간 예보를 확인하고 안전한 이동 계획을 세우는 것이 중요해 보여요`)
    ];
  }
  if(topic==='water'){
    const r=extractRegion(s)||'지역', c=extractCount(s)||'여러 곳의';
    return [
      two(`${r} ${c} 물놀이장이 이번 여름 순차적으로 개장할 예정이에요`, `시민들이 가까운 공원에서 시원한 피서를 즐길 수 있게 됐어요`),
      two(`물놀이장이 개장하는 이유는 여름철 더위로 인한 시민들의 수요를 반영한 결과예요`, `안전하게 여름을 즐길 수 있도록 공원이 준비한 장치들 덕분이에요`),
      two(`이번 개장으로 시민들은 여름철 더 즐겁게 시간을 보낼 수 있을 거예요`, `가족 단위 방문객 증가로 지역 상권에도 긍정적인 영향이 기대돼요`)
    ];
  }
  if(topic==='bookstore'){
    return [
      two(`동네 책방과 관련된 이야기가 새롭게 소개됐어요`, `작은 공간이 가진 개성과 지역 문화가 함께 주목받고 있어요`),
      two(`책방이 의미 있는 이유는 단순한 판매 공간을 넘어 취향을 나누는 장소가 되기 때문이에요`, `방문 자체가 하나의 문화 경험으로 소비되는 흐름이에요`),
      two(`앞으로 동네 책방은 산책 코스와 문화 소비를 연결하는 역할을 할 수 있어요`, `공간의 개성이 독자들의 방문 이유가 될 거예요`)
    ];
  }
  const base=cleanHtml(desc||title);
  const subject=titleSubject(title,desc);
  return [
    two(`${subject} 관련 소식이 새롭게 전해졌어요`, `기사의 핵심 흐름을 짧게 정리해볼 수 있어요`),
    two(`이 소식이 중요한 이유는 단순한 제목보다 그 안에 담긴 변화와 반응을 함께 봐야 하기 때문이에요`, `독자들이 현재 분위기를 더 쉽게 이해할 수 있어요`),
    two(`앞으로 관련 관심이 이어지며 더 넓게 확산될 가능성이 있어요`, `현장 반응과 후속 소식도 함께 살펴보면 좋아요`)
  ];
}
function makeTags(title,desc){return [...new Set(('#카드뉴스 #뉴스 '+lastQuery.split(/\s+/).map(v=>'#'+v).join(' ')).split(/\s+/))].slice(0,8).join(' ')}


function commitGeneratedCards(article,sourceText){
  const hook=makeHook(article.title,sourceText).replace(/요요/g,'요');
  const pts=makePoints(article.title,sourceText).map(v=>String(v||'').replace(/요요/g,'요').replace(/죠요/g,'죠'));

  cards=[
    {label:'HOOK',role:'HOOK',title:hook,body:'',subtitle:(article.domain||'')+' · '+(article.date||''),type:'hook'},
    {label:'BODY 1',role:'NOW TRENDING',title:'NOW TRENDING',body:pts[0]||'',type:'body'},
    {label:'BODY 2',role:'THE TAKEAWAY',title:'THE TAKEAWAY',body:pts[1]||'',type:'body'},
    {label:'BODY 3',role:"WHAT'S NEXT",title:"WHAT'S NEXT",body:pts[2]||'',type:'body'},
    {label:'CTA',role:'CTA',title:'"이거 왜 난리예요?"',body:'복잡한 이슈, 핵심만 쉽게\n한 장씩 넘기면 정리 끝',type:'cta'}
  ];

  // 뉴스가 바뀌면 이전 뉴스의 이미지/색상/수정 상태가 섞이지 않도록 초기화
  cardImages={};
  cardStyles={};

  renderCards();
  $('cards-panel').style.display='block';
}

async function generateFromArticle(index){
  hideLoading();
  const token=++generationSeq;

  const article=currentArticles[index];
  if(!article){
    showToast('기사 정보를 찾지 못했어요.');
    return;
  }

  document.querySelectorAll('.article').forEach((el,i)=>el.classList.toggle('selected',i===index));

  // 1차: 두 번째 뉴스부터 먹통처럼 보이지 않게, 검색 결과 설명으로 즉시 카드 전체 반영
  const quickSource=article.desc || article.title || '';
  commitGeneratedCards(article,quickSource);

  setTimeout(()=>$('cards-panel').scrollIntoView({behavior:'smooth',block:'start'}),60);
  showToast('선택한 뉴스가 카드뉴스에 바로 반영됐어요.');

  // 2차: 본문 읽기는 백그라운드에서만 시도. 화면 전체 로딩으로 클릭을 막지 않음.
  let body='';
  try{
    body=await readArticleBody(article);
  }catch(e){
    console.warn('기사 본문 읽기 실패:', e);
    body='';
  }

  // 그 사이 다른 뉴스를 눌렀으면 이전 뉴스 결과가 뒤늦게 덮어쓰지 않게 차단
  if(token!==generationSeq) return;

  if(body && body.length>120){
    commitGeneratedCards(article,body);
    showToast('기사 본문 기반으로 요약을 업데이트했어요.');
  }else{
    console.warn('[ARTICLE_BODY_FAIL] 본문 접근 실패. 검색 설명 기반 카드를 유지합니다.');
  }
}

function setStyle(i,k,v){styleOf(i)[k]=k==='size'?Number(v):v; rerenderCard(i)}
function rerenderCard(i){const el=$('card-'+i); if(el) el.innerHTML=cardHtml(cards[i],i); renderCaption()}

function setImage(i,input){

  const r=new FileReader(); r.onload=e=>{cardImages[i]=e.target.result;rerenderCard(i)}; r.readAsDataURL(f);
}
function renderCaption(){
  $('caption-box').innerHTML=cards.slice(0,4).map((c,i)=>`<div class="caption-line">${i===0?'⭐':i===3?'💬':'📍'} ${(i===0?c.title:c.body).replace(/\n/g,' ')}</div>`).join('');
  $('hashtag-box').textContent=makeTags(cards[0]?.title||'',cards[1]?.body||'');
}
function copyCaption(){
  const text=[...document.querySelectorAll('.caption-line')].map(x=>x.textContent).join('\n')+'\n\n'+$('hashtag-box').textContent;
  navigator.clipboard.writeText(text).then(()=>showToast('캡션을 복사했어요.'));
}
async function downloadAll(){
  if(!cards.length){showToast('먼저 카드를 생성해 주세요.');return}
  showLoading('이미지 생성 중...');
  try{
    const zip=new JSZip();
    for(let i=0;i<cards.length;i++){
      const canvas=await html2canvas($('card-'+i),{scale:3,useCORS:true,allowTaint:true,backgroundColor:null});
      const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
      zip.file(`card_${String(i+1).padStart(2,'0')}_${cards[i].label}.png`,blob);
    }
    zip.file('caption.txt',[...document.querySelectorAll('.caption-line')].map(x=>x.textContent).join('\n')+'\n\n'+$('hashtag-box').textContent);
    const data=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(data); a.download='cardnews.zip'; a.click();
    showToast('ZIP 다운로드 완료');
  }catch(e){console.error(e);showToast('다운로드 실패')}
  hideLoading();
}
</script>
</body>
</html>
